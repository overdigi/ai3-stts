<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
    <title>AI3-STTS Avatar 測試工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .test-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            height: calc(100vh - 40px);
        }

        .panel {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            background: #4a90e2;
            color: white;
            padding: 15px 20px;
            font-weight: 600;
        }

        .panel-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        /* Avatar Panel */
        .avatar-video-container {
            width: 100%;
            height: 350px;
            background: #1a1a2e;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            margin-bottom: 15px;
        }

        .avatar-video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.5);
            gap: 8px;
            font-size: 14px;
        }

        .avatar-placeholder .icon { font-size: 48px; }

        .session-status {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            background: rgba(0,0,0,0.6);
            color: #4ade80;
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #555;
            margin-bottom: 4px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        /* Buttons */
        .btn-row {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        .btn {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary { background: #4a90e2; color: white; }
        .btn-primary:hover { background: #357abd; }
        .btn-warning { background: #f59e0b; color: white; }
        .btn-warning:hover { background: #d97706; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-danger:hover { background: #dc2626; }
        .btn-success { background: #10b981; color: white; }
        .btn-success:hover { background: #059669; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }

        /* Recording */
        .mic-btn {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            cursor: pointer;
            background: #ff6b35;
            color: white;
        }
        .mic-btn.recording {
            background: #dc3545;
            animation: pulse 1s infinite;
        }
        @keyframes pulse { 50% { transform: scale(1.02); } }

        /* Log */
        .log-container {
            background: #1e1e2e;
            border-radius: 8px;
            padding: 12px;
            font-family: 'Menlo', 'Monaco', monospace;
            font-size: 12px;
            color: #cdd6f4;
            max-height: 200px;
            overflow-y: auto;
            margin-top: 15px;
        }

        .log-entry {
            padding: 2px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .log-time { color: #89b4fa; }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }
    </style>
</head>

<body>
    <div class="test-container">
        <!-- Left: Avatar Panel -->
        <div class="panel">
            <div class="panel-header">Avatar 畫面</div>
            <div class="panel-content">
                <div class="avatar-video-container" id="avatar-container">
                    <div class="avatar-placeholder" id="avatar-placeholder">
                        <div class="icon">🤖</div>
                        <div>設定參數後點擊「建立會話」</div>
                    </div>
                    <div class="session-status" id="session-status">未連線</div>
                </div>

                <!-- Session Controls -->
                <div class="btn-row">
                    <button class="btn btn-primary" id="btn-start" onclick="startSession()">建立會話</button>
                    <button class="btn btn-warning" id="btn-interrupt" onclick="interruptAvatar()" disabled>中斷說話</button>
                    <button class="btn btn-danger" id="btn-stop" onclick="stopSession()" disabled>結束會話</button>
                </div>

                <!-- STT -->
                <button class="mic-btn" id="mic-btn" onclick="toggleRecording()">🎤 開始語音辨識</button>

                <div id="transcript" style="margin-top: 10px; padding: 10px; background: #f8f9fa; border-radius: 6px; min-height: 40px; font-size: 14px; color: #333;">
                    點擊上方按鈕開始語音輸入
                </div>

                <!-- Log -->
                <div class="log-container" id="log-container"></div>
            </div>
        </div>

        <!-- Right: Control Panel -->
        <div class="panel">
            <div class="panel-header">測試控制台</div>
            <div class="panel-content">
                <!-- Server Config -->
                <h3 style="font-size: 14px; margin-bottom: 10px; color: #333;">Server 設定</h3>
                <div class="form-group">
                    <label>API URL</label>
                    <input type="text" id="api-url" value="http://localhost:3000">
                </div>

                <!-- Avatar Config -->
                <h3 style="font-size: 14px; margin: 15px 0 10px; color: #333;">Avatar 設定</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Avatar ID</label>
                        <input type="text" id="avatar-id" placeholder="從 server config 載入">
                    </div>
                    <div class="form-group">
                        <label>Voice ID</label>
                        <input type="text" id="voice-id" placeholder="從 server config 載入">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>畫質</label>
                        <select id="quality">
                            <option value="low">低 (Low)</option>
                            <option value="medium" selected>中 (Medium)</option>
                            <option value="high">高 (High)</option>
                            <option value="very_high">極高 (Very High)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>語言</label>
                        <input type="text" id="language" value="zh" placeholder="zh, en, ja...">
                    </div>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="sandbox-mode">
                    <label for="sandbox-mode" style="font-size: 13px;">Sandbox 模式（免費測試，1 分鐘限制，只能用 Wayne avatar）</label>
                </div>

                <button class="btn btn-success" onclick="loadConfig()" style="width: 100%; margin-bottom: 15px;">從 Server 載入設定</button>

                <!-- Speak Test -->
                <h3 style="font-size: 14px; margin: 15px 0 10px; color: #333;">發話測試</h3>
                <div class="form-group">
                    <label>文字內容</label>
                    <textarea id="speak-text" placeholder="輸入要讓 Avatar 說的話...">你好，歡迎使用 AI3 語音互動系統。</textarea>
                </div>

                <div class="btn-row">
                    <button class="btn btn-primary" id="btn-speak" onclick="speakText()" disabled>發送文字</button>
                </div>

                <!-- Quick Test Phrases -->
                <h3 style="font-size: 14px; margin: 15px 0 10px; color: #333;">快速測試</h3>
                <div style="display: flex; flex-wrap: wrap; gap: 6px;">
                    <button class="btn btn-primary" style="flex: none; font-size: 12px; padding: 6px 12px;" onclick="quickSpeak('你好，我是 AI 助理。')">打招呼</button>
                    <button class="btn btn-primary" style="flex: none; font-size: 12px; padding: 6px 12px;" onclick="quickSpeak('這是一段較長的測試文字。我可以幫你解答各種問題，請問有什麼我可以幫忙的嗎？')">長文字</button>
                    <button class="btn btn-primary" style="flex: none; font-size: 12px; padding: 6px 12px;" onclick="quickSpeak('Hello, this is an English test.')">英文</button>
                    <button class="btn btn-primary" style="flex: none; font-size: 12px; padding: 6px 12px;" onclick="quickSpeak('こんにちは、テストです。')">日文</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Dependencies -->
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <!-- EventEmitter polyfill: LiveAvatar SDK UMD 需要 events 模組 -->
    <script>
    window.events$1 = { EventEmitter: class EventEmitter {
        constructor() { this._e = {}; }
        on(e, f) { (this._e[e] = this._e[e] || []).push(f); return this; }
        off(e, f) { const l = this._e[e]; if (l) this._e[e] = l.filter(x => x !== f); return this; }
        emit(e, ...a) { (this._e[e] || []).forEach(f => f(...a)); return this; }
        once(e, f) { const w = (...a) => { this.off(e, w); f(...a); }; return this.on(e, w); }
        removeAllListeners(e) { if (e) delete this._e[e]; else this._e = {}; return this; }
        addListener(e, f) { return this.on(e, f); }
        removeListener(e, f) { return this.off(e, f); }
        listenerCount(e) { return (this._e[e] || []).length; }

    </script>
    <script src="https://cdn.jsdelivr.net/npm/@heygen/liveavatar-web-sdk/dist/index.umd.js"></script>
    <script src="ai3-stts.js"></script>
    <script>
        // --- State ---
        let client = null;
        let avatarSession = null;
        let sttSession = null;
        let mediaStream = null;
        let audioContext = null;
        let isRecording = false;

        // --- Logging ---
        function log(msg, data) {
            const time = new Date().toLocaleTimeString();
            const container = document.getElementById('log-container');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span class="log-time">[${time}]</span> ${msg}`;
            if (data) entry.innerHTML += ` <span style="color:#a6adc8">${JSON.stringify(data)}</span>`;
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
            console.log(`[${time}] ${msg}`, data || '');
        }

        function updateSessionStatus(text, color) {
            const el = document.getElementById('session-status');
            el.textContent = text;
            el.style.color = color || '#4ade80';
        }

        // --- Init ---
        document.addEventListener('DOMContentLoaded', () => {
            const apiUrl = document.getElementById('api-url').value;
            client = new AI3STTS({ apiUrl });
            log('SDK 初始化完成');
            loadConfig();
        });

        // --- Config ---
        async function loadConfig() {
            try {
                const apiUrl = document.getElementById('api-url').value;
                client = new AI3STTS({ apiUrl });

                const config = await client.getConfig();
                if (config.avatarId) document.getElementById('avatar-id').value = config.avatarId;
                if (config.voiceId) document.getElementById('voice-id').value = config.voiceId;
                log('Server 設定載入成功', config);
            } catch (error) {
                log('載入設定失敗: ' + error.message);
            }
        }

        // --- Session ---
        async function startSession() {
            try {
                document.getElementById('btn-start').disabled = true;
                updateSessionStatus('建立中...', '#facc15');
                log('正在建立 LiveAvatar 會話...');

                const isSandbox = document.getElementById('sandbox-mode').checked;
                const avatarId = isSandbox
                    ? 'dd73ea75-1218-4ef3-92ce-606d5f7fbc0a'
                    : document.getElementById('avatar-id').value;

                if (!avatarId) {
                    throw new Error('請設定 Avatar ID');
                }

                avatarSession = await client.createLiveAvatarSession({
                    avatarId,
                    voiceId: isSandbox ? undefined : document.getElementById('voice-id').value || undefined,
                    quality: document.getElementById('quality').value,
                    language: document.getElementById('language').value || undefined,
                    isSandbox,
                    onEvent: (event, data) => {
                        log(`Avatar 事件: ${event}`, data);
                        if (event === 'avatar_start_talking') updateSessionStatus('說話中', '#facc15');
                        if (event === 'avatar_stop_talking') updateSessionStatus('已連線', '#4ade80');
                        if (event === 'session_stopped') {
                            updateSessionStatus('已結束', '#f87171');
                            resetButtons();
                        }
                    },
                });

                document.getElementById('avatar-placeholder').classList.add('hidden');
                updateSessionStatus('已連線', '#4ade80');
                document.getElementById('btn-interrupt').disabled = false;
                document.getElementById('btn-stop').disabled = false;
                document.getElementById('btn-speak').disabled = false;
                log('會話建立成功: ' + avatarSession.sessionId);
            } catch (error) {
                log('建立會話失敗: ' + error.message);
                updateSessionStatus('錯誤', '#f87171');
                document.getElementById('btn-start').disabled = false;
            }
        }

        async function stopSession() {
            try {
                if (avatarSession) {
                    await avatarSession.stop();
                    avatarSession = null;
                }
                document.getElementById('avatar-placeholder').classList.remove('hidden');
                updateSessionStatus('已斷線', '#a6adc8');
                resetButtons();
                log('會話已結束');
            } catch (error) {
                log('結束會話失敗: ' + error.message);
            }
        }

        function interruptAvatar() {
            if (avatarSession) {
                avatarSession.interrupt();
                log('已中斷說話');
            }
        }

        function resetButtons() {
            document.getElementById('btn-start').disabled = false;
            document.getElementById('btn-interrupt').disabled = true;
            document.getElementById('btn-stop').disabled = true;
            document.getElementById('btn-speak').disabled = true;
        }

        // --- Speak ---
        function speakText() {
            const text = document.getElementById('speak-text').value.trim();
            if (!text || !avatarSession) return;
            avatarSession.speak(text);
            log('發送文字: ' + text);
        }

        function quickSpeak(text) {
            if (!avatarSession) {
                log('請先建立會話');
                return;
            }
            document.getElementById('speak-text').value = text;
            avatarSession.speak(text);
            log('快速發送: ' + text);
        }

        // --- STT ---
        async function toggleRecording() {
            if (isRecording) {
                await stopRecording();
            } else {
                await startRecording();
            }
        }

        async function startRecording() {
            if (isRecording) return;
            const micBtn = document.getElementById('mic-btn');

            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioContext.createMediaStreamSource(mediaStream);
                const processor = audioContext.createScriptProcessor(1024, 1, 1);
                const ratio = audioContext.sampleRate / 16000;

                sttSession = await client.startSTT({ language: 'zh-TW' });

                sttSession.onRecognizing((r) => {
                    document.getElementById('transcript').textContent = r.text + '...';
                });
                sttSession.onResult((r) => {
                    document.getElementById('transcript').textContent = r.text;
                    document.getElementById('speak-text').value = r.text;
                    log('STT 結果: ' + r.text);
                });
                sttSession.onError((e) => log('STT 錯誤: ' + e));

                processor.onaudioprocess = (e) => {
                    if (sttSession && isRecording) {
                        const input = e.inputBuffer.getChannelData(0);
                        sttSession.sendAudio(convertToPCM16(resample(input, ratio)));
                    }
                };

                source.connect(processor);
                processor.connect(audioContext.destination);

                isRecording = true;
                micBtn.textContent = '🛑 停止語音辨識';
                micBtn.classList.add('recording');
                log('開始語音辨識');
            } catch (error) {
                log('語音辨識失敗: ' + error.message);
            }
        }

        async function stopRecording() {
            isRecording = false;
            const micBtn = document.getElementById('mic-btn');

            if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
            if (audioContext) { await audioContext.close(); audioContext = null; }
            if (sttSession) { sttSession.stop(); sttSession = null; }

            micBtn.textContent = '🎤 開始語音辨識';
            micBtn.classList.remove('recording');
            log('停止語音辨識');
        }

        // --- Audio Utils ---
        function resample(input, ratio) {
            if (ratio <= 1) return input;
            const len = Math.floor(input.length / ratio);
            const out = new Float32Array(len);
            for (let i = 0; i < len; i++) {
                const idx = i * ratio;
                const f = Math.floor(idx);
                const frac = idx - f;
                out[i] = f + 1 < input.length ? input[f] * (1 - frac) + input[f + 1] * frac : input[f];
            }
            return out;
        }

        function convertToPCM16(input) {
            const buf = new ArrayBuffer(input.length * 2);
            const view = new DataView(buf);
            for (let i = 0; i < input.length; i++) {
                const s = Math.max(-1, Math.min(1, input[i]));
                view.setInt16(i * 2, s < 0 ? s * 0x8000 : s * 0x7fff, true);
            }
            return buf;
        }
    </script>
</body>
