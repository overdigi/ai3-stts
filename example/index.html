<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI3-STTS Demo — LiveAvatar</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: #4a90e2;
            color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
        }

        .avatar-container {
            width: 100%;
            height: 320px;
            background: #1a1a2e;
            position: relative;
            overflow: hidden;
        }

        .avatar-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.6);
            gap: 10px;
        }

        .avatar-placeholder .icon { font-size: 48px; }

        .status-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        .status-badge.ready { color: #4ade80; }
        .status-badge.speaking { color: #facc15; }
        .status-badge.error { color: #f87171; }

        .transcript-area {
            background: #f8f9fa;
            min-height: 80px;
            padding: 15px 20px;
            display: flex;
            align-items: center;
        }

        .transcript-text {
            flex: 1;
            color: #333;
            font-size: 15px;
            line-height: 1.5;
        }

        .mic-button {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: #ff6b35;
            color: white;
            font-size: 20px;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.2s;
        }
        .mic-button:hover { background: #e55a2b; transform: scale(1.05); }
        .mic-button.recording { background: #dc3545; animation: pulse 1s infinite; }
        @keyframes pulse { 50% { transform: scale(1.1); } }

        .input-area {
            padding: 12px 20px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .text-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #e1e8ed;
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            resize: none;
            outline: none;
            min-height: 42px;
            max-height: 100px;
        }
        .text-input:focus { border-color: #4a90e2; }

        .send-button {
            padding: 10px 16px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
        }
        .send-button:hover { background: #357abd; }
        .send-button:disabled { background: #ccc; cursor: not-allowed; }

        .controls {
            padding: 10px 20px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 8px;
        }

        .ctrl-btn {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: white;
            font-size: 12px;
            cursor: pointer;
        }
        .ctrl-btn:hover { background: #f0f0f0; }
        .ctrl-btn.danger { color: #dc3545; border-color: #dc3545; }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span>AI3-STTS LiveAvatar Demo</span>
        </div>

        <!-- Avatar Video Area -->
        <div class="avatar-container" id="avatar-container">
            <div class="avatar-placeholder" id="avatar-placeholder">
                <div class="icon">🤖</div>
                <div>點擊「建立會話」啟動 Avatar</div>
            </div>
            <div class="status-badge" id="status-badge">未連線</div>
        </div>

        <!-- Transcript -->
        <div class="transcript-area">
            <div class="transcript-text" id="transcript-text">點擊麥克風開始語音輸入</div>
            <button class="mic-button" id="mic-button">🎤</button>
        </div>

        <!-- Text Input -->
        <div class="input-area">
            <textarea class="text-input" id="text-input" placeholder="輸入文字讓 Avatar 說話..." rows="1"></textarea>
            <button class="send-button" id="send-button">發送</button>
        </div>

        <!-- Controls -->
        <div class="controls">
            <button class="ctrl-btn" id="start-btn" onclick="startSession()">建立會話</button>
            <button class="ctrl-btn" id="interrupt-btn" onclick="interruptAvatar()" disabled>中斷</button>
            <button class="ctrl-btn danger" id="stop-btn" onclick="stopSession()" disabled>結束會話</button>
        </div>
    </div>

    <!-- Dependencies -->
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@heygen/liveavatar-web-sdk/dist/index.umd.js"></script>
    <script src="ai3-stts.js"></script>
    <script src="app.js"></script>
</body>
</html>
